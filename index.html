<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Calculadora Salarial 2026</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Sweet Alert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

    <form class="formulario" onsubmit="calcularSalarioPrincipal(event)">
        <h2>Holerite Digital 2026</h2>

        <label for="salarioBruto">Salário Bruto (R$)</label>
        <input type="number" id="salarioBruto" placeholder="Digite o salário bruto" step="0.01" autofocus>

        <label for="descInss">Desconto INSS (Tabela 2026)</label>
        <input type="text" id="descInss" disabled placeholder="R$ 0,00">

        <label for="descIrrf">Imposto de Renda (Isenção até 5k)</label>
        <input type="text" id="descIrrf" disabled placeholder="R$ 0,00">

        <button type="submit" id="btnCalcular">Calcular Agora</button>
        <button type="button" id="btnLimpar" class="clear">Limpar Tudo</button>

        <div id="resultado">
            <strong>Salário Líquido Final:</strong>
            <span id="valorLiquido">R$ 0,00</span>
        </div>
    </form>

    <script src="js/script.js"></script>
</body>

</html>
